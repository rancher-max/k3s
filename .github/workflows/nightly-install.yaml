name: Nightly Install
on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "0 * * * *"
  workflow_dispatch: {}
jobs:
  test:
    name: "Smoke Test"
    runs-on: macos-12
    timeout-minutes: 40
    env:
      INSTALL_K3S_COMMIT: $GITHUB_SHA
    steps:
      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!
      - name: Get environment
        run: env
